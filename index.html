<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="./styles.css">
    <title>RPG - Shadow of Apep</title>
  </head>
  <body>
    <div id="game">
      <div id="stats">
        <span class="stat">XP: <strong><span id="xpText">0</span></strong></span>
        <span class="stat">Health: <strong><span id="healthText">100</span></strong></span>
        <span class="stat">Gold: <strong><span id="goldText">50</span></strong></span>
      </div>
      <div id="controls">
        <button id="button1">Go to Bazaar</button>
        <button id="button2">Go to Necropolis</button>
        <button id="button3">Fight The High Priest</button>
      </div>
      <div id="monsterStats">
        <span class="stat">Enemy: <strong><span id="monsterName"></span></strong></span>
        <span class="stat">Health: <strong><span id="monsterHealth"></span></strong></span>
      </div>
      <div id="text">
        Welcome, Medjay. The High Priest Akhenaten has raised the dead. You stand in the safe haven of the Temple of Karnak. Where will you go?
      </div>
    </div>
    <script src="./scripts.js"></script>
  </body>
</html>
